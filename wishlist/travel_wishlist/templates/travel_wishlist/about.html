<h2>About</h2>

<!-- display wishlist by letter, website with author name, and whether author name provided  -->
<div>

    <p>{{ about }}</p>

    {% for letter in 'wishlist' %}

    <p> {{ letter }} </p>

    {% endfor %}

    <p>A website by {{ author }}</p>

    {% if author %}

    <p>The author's name has been provided.</p>

    {% else %}

    <p>The author's name has not been provided.</p>

    {% endif %}

</div>
